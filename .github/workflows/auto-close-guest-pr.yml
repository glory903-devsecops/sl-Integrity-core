name: Auto Close Guest PRs
on:
  pull_request_target:
    types: [opened]

jobs:
  close-pr:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'glory903-devsecops'
    steps:
      - name: Close Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "보안 정책상 외부 기여는 허용되지 않습니다. 본 PR은 자동으로 닫힙니다. / This repository does not accept external contributions for security reasons. This PR will be closed automatically."
            });
            github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });
